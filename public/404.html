<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Shimron M. Guray | Full-Stack Developer & Software Engineer</title>
    <!--
      GitHub Pages SPA redirect (https://github.com/rafgraph/spa-github-pages).
      GitHub Pages has no server-side rewrites, so a deep-link 404 gets redirected
      here, re-encoded as a query string, and index.html restores the real path.
    -->
    <script>
      var pathSegmentsToKeep = 1; // keep "/my-por"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

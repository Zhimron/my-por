<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title description">
  <title id="title">Lightem Business Management Platform</title>
  <desc id="description">A stylized enterprise dashboard representing connected business modules.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="55%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#background)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="1050" cy="115" r="220" fill="#67e8f9" opacity="0.08"/>
  <circle cx="165" cy="620" r="260" fill="#a78bfa" opacity="0.1"/>

  <g filter="url(#shadow)">
    <rect x="155" y="105" width="890" height="475" rx="30" fill="#f8fafc"/>
    <rect x="155" y="105" width="205" height="475" rx="30" fill="#111827"/>
    <rect x="330" y="105" width="30" height="475" fill="#111827"/>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="200" y="165" font-size="30" font-weight="700" fill="#ffffff">LIGHTEM</text>
    <text x="200" y="190" font-size="12" letter-spacing="2" fill="#94a3b8">BUSINESS PLATFORM</text>

    <g font-size="14" fill="#cbd5e1">
      <rect x="180" y="225" width="150" height="40" rx="10" fill="#4f46e5"/>
      <text x="205" y="250" fill="#ffffff">Dashboard</text>
      <text x="205" y="300">Accounting</text>
      <text x="205" y="345">Inventory &amp; POS</text>
      <text x="205" y="390">HRIS &amp; Payroll</text>
      <text x="205" y="435">Sales</text>
      <text x="205" y="480">Ticketing</text>
      <text x="205" y="525">Reports</text>
    </g>

    <text x="405" y="165" font-size="24" font-weight="700" fill="#0f172a">Operations overview</text>
    <text x="405" y="192" font-size="13" fill="#64748b">Connected modules. One secure workspace.</text>

    <g>
      <rect x="405" y="225" width="180" height="102" rx="16" fill="#eef2ff"/>
      <rect x="607" y="225" width="180" height="102" rx="16" fill="#ecfeff"/>
      <rect x="809" y="225" width="180" height="102" rx="16" fill="#ecfdf5"/>
      <text x="425" y="255" font-size="13" fill="#64748b">FINANCE</text>
      <text x="425" y="295" font-size="27" font-weight="700" fill="#4338ca">Accounting</text>
      <text x="627" y="255" font-size="13" fill="#64748b">OPERATIONS</text>
      <text x="627" y="295" font-size="27" font-weight="700" fill="#0e7490">Inventory</text>
      <text x="829" y="255" font-size="13" fill="#64748b">PEOPLE</text>
      <text x="829" y="295" font-size="27" font-weight="700" fill="#047857">HRIS</text>
    </g>

    <rect x="405" y="355" width="584" height="168" rx="18" fill="#f1f5f9"/>
    <text x="430" y="388" font-size="13" font-weight="700" fill="#475569">ACTIVITY ACROSS MODULES</text>
    <path d="M440 480 C500 435 540 465 595 410 S700 485 760 430 S865 455 950 395" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <g fill="#ffffff" stroke="#6366f1" stroke-width="4">
      <circle cx="440" cy="480" r="8"/>
      <circle cx="595" cy="410" r="8"/>
      <circle cx="760" cy="430" r="8"/>
      <circle cx="950" cy="395" r="8"/>
    </g>
  </g>
</svg>
